services:
  - type: web
    name: ai-lab-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install poetry && poetry install"
    startCommand: "cd backend && poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DB_PATH
        value: "ai_lab.db"
