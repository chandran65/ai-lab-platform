version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/ai_lab.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-key-change-in-production-2024}
    volumes:
      - backend-data:/data
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
